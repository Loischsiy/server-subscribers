rule-providers:
  torrent-clients:
    type: http
    url: 'https://raw.githubusercontent.com/legiz-ru/mihomo-rule-sets/refs/heads/main/other/torrent-clients.yaml'
    interval: 43200
    proxy: DIRECT
    behavior: classical
    format: yaml
  torrent-trackers:
    type: http
    behavior: domain
    format: mrs
    url: https://github.com/legiz-ru/mihomo-rule-sets/raw/main/other/torrent-trackers.mrs
    path: ./rule-sets/torrent-trackers.mrs
    interval: 43200
  geoip-ru:
    type: http
    behavior: ipcidr
    format: mrs
    url: https://github.com/MetaCubeX/meta-rules-dat/raw/meta/geo/geoip/ru.mrs
    path: ./geoip-ru.mrs
    interval: 43200
  geosite-ru:
    type: http
    behavior: domain
    format: mrs
    url: https://github.com/MetaCubeX/meta-rules-dat/raw/meta/geo/geosite/category-ru.mrs
    path: ./geosite-ru.mrs
    interval: 43200
  geosite-private:
    type: http
    behavior: domain
    format: mrs
    url: https://github.com/MetaCubeX/meta-rules-dat/raw/meta/geo/geosite/private.mrs
    path: ./geosite-private.mrs
    interval: 43200
  geoip-private:
    type: http
    behavior: ipcidr
    format: mrs
    url: https://github.com/MetaCubeX/meta-rules-dat/raw/meta/geo/geoip/private.mrs
    path: ./geoip-private.mrs
    interval: 43200
  HageziProPlus:
    type: http
    format: mrs
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/MiHomoer/MiHomo-Hagezi@release/HageziProPlus.mrs"
    path: ./HageziProPlus.mrs
    interval: 43200

rules:
  # Для частных сетей
  - RULE-SET,geosite-private,DIRECT,no-resolve
  - RULE-SET,geoip-private,DIRECT
  # Для джостиков flydigi
  - DOMAIN-KEYWORD,flydigi,DIRECT
  # Для торрент программ из ruleset
  - DOMAIN-KEYWORD,torrent,DIRECT
  - RULE-SET,torrent-clients,DIRECT
  - RULE-SET,torrent-trackers,DIRECT
  # Для торрент программ самый популярных в виндовс мак и линукс
  - PROCESS-NAME,qBittorrent.exe,DIRECT
  - PROCESS-NAME,uTorrent.exe,DIRECT
  - PROCESS-NAME,qbittorrent,DIRECT
  - PROCESS-NAME,qBittorrent,DIRECT
  # Для торрент программ самый популярных на андроид
  - PROCESS-NAME,org.qbittorrent.client,DIRECT
  - PROCESS-NAME,com.utorrent.client,DIRECT
  - PROCESS-NAME,com.bittorrent.client,DIRECT
  # Для игр китайских от supercell
  - PROCESS-NAME,com.tencent.tmgp.supercell.*,DIRECT
  # Для отображения айпи в clash программах
  - DOMAIN-SUFFIX,ipwho.is,Dimon-subscribers
  - DOMAIN-SUFFIX,ip-api.com,Dimon-subscribers
  - DOMAIN-SUFFIX,ip.sb,Dimon-subscribers
  # Для аниме сайтов
  - DOMAIN-KEYWORD,anime,Dimon-subscribers
  # Для вк
  - DOMAIN-KEYWORD,vk,DIRECT
  # Для ру сайтов
  - RULE-SET,geoip-ru,DIRECT
  - RULE-SET,geosite-ru,DIRECT
  - DOMAIN-SUFFIX,ru,DIRECT
  - DOMAIN-SUFFIX,su,DIRECT
  - DOMAIN-SUFFIX,ru.com,DIRECT
  - DOMAIN-SUFFIX,ru.net,DIRECT
  # Блокировка рекламы
  - RULE-SET,HageziProPlus,REJECT,no-resolve
  # Все остальное
  - MATCH,Dimon-subscribers
